<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Gustavo Swingtet — acoustic swing from Bern, Switzerland.">
  <title>The Gustavo Swingtet</title>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/hod4umf.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="home">
  
<header class="site-header">
  <div class="container">
    <a class="wordmark" href="index.html" aria-label="The Gustavo Swingtet home">
      <span class="wordmark-top">The Gustavo</span>
      <span class="wordmark-bottom">Swingtet</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation" data-nav-toggle>
      <span class="sr-only" data-i18n="common.srOpenNavigation"></span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 7h16v2H4zm0 6h16v2H4zm0 6h16v2H4z"/></svg>
    </button>

    <div class="nav-row" id="site-navigation" data-nav-row>
      <nav class="site-nav" aria-label="Primary" data-i18n-aria-label="common.ariaPrimaryNav">
        <a href="index.html" class="active" data-i18n="common.navHome"></a>
<a href="media.html" class="" data-i18n="common.navMedia"></a>
<a href="about.html" class="" data-i18n="common.navAbout"></a>
<a href="contact.html" class="" data-i18n="common.navContact"></a>
      </nav>

      <div class="lang-switch" aria-label="Language switcher" data-i18n-aria-label="common.ariaLanguageSwitcher">
        <button type="button" data-lang-button="en" aria-pressed="true">EN</button>
        <button type="button" data-lang-button="de" aria-pressed="false">DE</button>
        <button type="button" data-lang-button="fr" aria-pressed="false">FR</button>
      </div>
    </div>
  </div>
</header>

  <main class="page-shell">
    
<section class="hero-home">
  <div class="container">
    <div class="hero-copy">
      <span class="eyebrow" data-i18n="home.heroEyebrow"></span>
      <h1 class="hero-title">The Gustavo <span class="accent">Swingtet</span></h1>
      <p class="hero-subtitle" data-i18n="home.heroSubtitle"></p>
      <div class="hero-actions">
        <a class="button primary" href="media.html" data-i18n="home.ctaMedia"></a>
        <a class="button secondary" href="contact.html" data-i18n="home.ctaContact"></a>
      </div>
      <p class="hero-note" data-i18n="home.heroNote"></p>
    </div>
  </div>
</section>

<section class="section tight">
  <div class="container grid-2">
    <div class="quote-card">
      <span class="eyebrow" data-i18n="home.liveEyebrow"></span>
      <div class="blockquote-mark">“</div>
      <blockquote data-i18n="home.liveCopy"></blockquote>
      <footer data-i18n="home.quoteFooter"></footer>
    </div>
    <div class="panel image-panel">
      <img src="assets/images/trumpet-detail.jpg" alt="Close-up of trumpet in warm light.">
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow" data-i18n="home.cardsEyebrow"></span>
      <h2 class="section-title" data-i18n="home.cardsTitle"></h2>
    </div>

    <div class="card-grid">
      <article class="card">
        <h3 class="card-title" data-i18n="home.card1Title"></h3>
        <p data-i18n="home.card1Copy"></p>
      </article>
      <article class="card">
        <h3 class="card-title" data-i18n="home.card2Title"></h3>
        <p data-i18n="home.card2Copy"></p>
      </article>
      <article class="card">
        <h3 class="card-title" data-i18n="home.card3Title"></h3>
        <p data-i18n="home.card3Copy"></p>
      </article>
    </div>
  </div>
</section>

<section class="section" id="featured-media">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow" data-i18n="home.featuredEyebrow"></span>
      <h2 class="section-title" data-i18n="home.featuredTitle"></h2>
      <p class="section-copy" data-i18n="home.featuredCopy"></p>
    </div>

    <div class="embed-grid">
      <article class="embed-card">
        <div class="embed-card-header">
          <h3 class="card-title" data-i18n="home.youtubeTitle"></h3>
          <p class="meta-line" data-i18n="home.youtubeCopy"></p>
        </div>
        <div class="embed-card-body">
          <iframe class="embed-frame" src="https://www.youtube-nocookie.com/embed/8yo70d3_rfU" title="Featured YouTube performance" data-i18n-title="home.iframeVideoTitle" loading="lazy" allowfullscreen></iframe>
        </div>
      </article>

      <article class="embed-card">
        <div class="embed-card-header">
          <h3 class="card-title" data-i18n="home.audioTitle"></h3>
          <p class="meta-line" data-i18n="home.audioCopy"></p>
        </div>
        <div class="embed-card-body">
          <section class="custom-audio-player home-audio-player" aria-label="Homepage music preview" data-i18n-aria-label="home.audioSectionLabel">
            <div class="custom-audio-stage home-audio-stage">
              <div class="custom-audio-stage-top">
                <span class="custom-audio-current-index" data-audio-current-index>01</span>
                <div>
                  <p class="custom-audio-current-label" data-i18n="home.previewLabel"></p>
                  <h3 class="custom-audio-current-title" data-audio-current-title>memories take 2</h3>
                  <p class="custom-audio-current-caption" data-audio-current-caption data-i18n="home.previewCaption"></p>
                </div>
              </div>

              <div class="custom-audio-controls-row">
                <button type="button" class="custom-audio-play" data-audio-play aria-label="Play preview track" data-audio-play-label="contact.playPreviewTrack">
                  <span class="custom-audio-play-icon">▶</span>
                </button>
                <div class="custom-audio-progress-wrap">
                  <input type="range" min="0" max="100" value="0" class="custom-audio-progress" data-audio-progress aria-label="Track progress" data-i18n-aria-label="home.progressLabel">
                  <div class="custom-audio-time-row">
                    <span data-audio-current-time>0:00</span>
                    <span data-audio-duration>0:00</span>
                  </div>
                </div>
              </div>

              <div class="custom-audio-bottom-row">
                <label class="custom-audio-volume-wrap" aria-label="Volume control" data-i18n-aria-label="home.volumeLabel">
                  <span class="custom-audio-volume-label" data-i18n="home.volumeShort"></span>
                  <input type="range" min="0" max="1" step="0.01" value="1" class="custom-audio-volume" data-audio-volume>
                </label>
                <a class="button secondary" href="media.html" data-i18n="home.moreRecordings"></a>
              </div>

              <div class="home-audio-tracklist" hidden>
                <button type="button" class="custom-track is-active" data-audio-track data-src="assets/audio/memories%20take%202.m4a" data-title="memories take 2" data-caption="Homepage preview" data-index="01">
                  <span class="custom-track-index">01</span>
                  <span class="custom-track-text">
                    <span class="custom-track-title">memories take 2</span>
                    <span class="custom-track-caption" data-i18n="home.previewCaption"></span>
                  </span>
                </button>
              </div>

              <audio preload="metadata" class="custom-audio-element" data-audio-element>
                <source src="assets/audio/memories%20take%202.m4a" type="audio/mp4">
                <span data-i18n="home.audioFallback"></span>
              </audio>
            </div>
          </section>
        </div>
      </article>
    </div>
  </div>
</section>

<section class="section">
  <div class="container grid-2">
    <div class="panel image-panel">
      <img src="assets/images/band-stage.jpg" alt="Band performing together on stage.">
    </div>
    <div class="text-panel panel">
      <span class="eyebrow" data-i18n="home.homeAboutEyebrow"></span>
      <h2 class="section-title" data-i18n="home.homeAboutTitle"></h2>
      <p class="lead" data-i18n="home.homeAboutCopy"></p>
      <div class="hero-actions">
        <a class="button secondary" href="about.html" data-i18n="home.homeAboutButton"></a>
      </div>
    </div>
  </div>
</section>

  </main>
  
<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <div class="footer-copy" data-i18n="common.footerTagline"></div>
      <div class="footer-copy" style="margin-top: 0.35rem;"><a href="mailto:gustavoswingtet@gmail.com" data-i18n="common.footerMail"></a></div>
      <div class="footer-copy" style="margin-top: 0.35rem;"><span data-year></span> · <span data-i18n="common.footerCopyright"></span></div>
    </div>

    <div>
      <div class="footer-copy" style="margin-bottom: 0.65rem;" data-i18n="common.socialHeading"></div>
      <div class="social-row">
        <a class="social-link" href="https://www.youtube.com/@GustavoSwingtet" target="_blank" rel="noreferrer" aria-label="YouTube"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.7 15.7V8.3L16.2 12l-6.5 3.7Z"/></svg></a>
        <a class="social-link" href="https://www.instagram.com/gustavoswingtet/" target="_blank" rel="noreferrer" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm10.45 1.65a1.35 1.35 0 1 1 0 2.7 1.35 1.35 0 0 1 0-2.7ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.2A2.8 2.8 0 1 0 12 14.8 2.8 2.8 0 0 0 12 9.2Z"/></svg></a>
        <a class="social-link" href="https://soundcloud.com/the-gustavo-swingtet" target="_blank" rel="noreferrer" aria-label="SoundCloud"><img class="soundcloud-icon-img" src="https://cdn.simpleicons.org/soundcloud/E5D1B1?viewbox=auto" alt="" aria-hidden="true"></a>
      </div>
    </div>
  </div>
</footer>
<div class="toast" aria-live="polite" data-toast></div>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
