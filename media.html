<section class="section">
  <div class="container embed-grid">
    <article class="embed-card">
      <div class="embed-card-header">
        <span class="eyebrow" data-i18n="media.videoEyebrow"></span>
        <h2 class="section-title" data-i18n="media.videoTitle"></h2>
        <p class="section-copy" data-i18n="media.videoCopy"></p>
      </div>
      <div class="embed-card-body">
        <iframe class="embed-frame" src="https://www.youtube-nocookie.com/embed/8yo70d3_rfU" title="Featured YouTube performance" data-i18n-title="media.iframeVideoTitle" loading="lazy" allowfullscreen></iframe>

        </div>
      </div>
    </article>

    <article class="embed-card">
      <div class="embed-card-header">
        <span class="eyebrow" data-i18n="media.audioEyebrow"></span>
        <h2 class="section-title" data-i18n="media.audioTitle"></h2>
        <p class="section-copy" data-i18n="media.audioCopy"></p>
      </div>
      <div class="embed-card-body">
        <section class="custom-audio-player" aria-label="Early recordings player" data-i18n-aria-label="media.audioSectionLabel">
          <div class="custom-audio-layout">
            <div class="custom-audio-sidebar">
              <p class="custom-audio-kicker" data-i18n="media.playerKicker"></p>
              <h3 class="custom-audio-heading" data-i18n="media.audioTitle"></h3>
              <p class="custom-audio-description">A first set of rough recordings presented in a cleaner player layout that can later become the permanent on-site listening section.</p>

              <div class="custom-track-list" role="list" aria-label="Track list" data-i18n-aria-label="media.trackListLabel">
                <button type="button" class="custom-track is-active" data-audio-track data-src="assets/audio/memories%20take%202.m4a" data-title="memories take 2" data-caption="Test demo" data-index="01">
                  <span class="custom-track-index">01</span>
                  <span class="custom-track-text">
                    <span class="custom-track-title">memories take 2</span>
                    <span class="custom-track-caption" data-i18n="media.playerDemoLabel"></span>
                  </span>
                </button>

                <button type="button" class="custom-track" data-audio-track data-src="assets/audio/mimosa.m4a" data-title="mimosa" data-caption="Test demo" data-index="02">
                  <span class="custom-track-index">02</span>
                  <span class="custom-track-text">
                    <span class="custom-track-title">mimosa</span>
                    <span class="custom-track-caption" data-i18n="media.playerDemoLabel"></span>
                  </span>
                </button>

                <button type="button" class="custom-track" data-audio-track data-src="assets/audio/minor%20backings.m4a" data-title="minor backings" data-caption="Test demo" data-index="03">
                  <span class="custom-track-index">03</span>
                  <span class="custom-track-text">
                    <span class="custom-track-title">minor backings</span>
                    <span class="custom-track-caption" data-i18n="media.playerDemoLabel"></span>
                  </span>
                </button>
              </div>
            </div>

            <div class="custom-audio-stage">
              <div class="custom-audio-stage-top">
                <span class="custom-audio-current-index" data-audio-current-index>01</span>
                <div>
                  <p class="custom-audio-current-label" data-i18n="media.playerCurrentLabel"></p>
                  <h3 class="custom-audio-current-title" data-audio-current-title>memories take 2</h3>
                  <p class="custom-audio-current-caption" data-audio-current-caption data-i18n="media.playerDemoLabel"></p>
                </div>
              </div>

              <div class="custom-audio-controls-row">
                <button type="button" class="custom-audio-play" data-audio-play aria-label="Play selected track" data-audio-play-label="contact.playSelectedTrack">
                  <span class="custom-audio-play-icon">▶</span>
                </button>
                <div class="custom-audio-progress-wrap">
                  <input type="range" min="0" max="100" value="0" class="custom-audio-progress" data-audio-progress aria-label="Track progress" data-i18n-aria-label="media.progressLabel">
                  <div class="custom-audio-time-row">
                    <span data-audio-current-time>0:00</span>
                    <span data-audio-duration>0:00</span>
                  </div>
                </div>
              </div>

              <div class="custom-audio-bottom-row">
                <label class="custom-audio-volume-wrap" aria-label="Volume control" data-i18n-aria-label="media.volumeLabel">
                  <span class="custom-audio-volume-label" data-i18n="media.volumeShort"></span>
                  <input type="range" min="0" max="1" step="0.01" value="1" class="custom-audio-volume" data-audio-volume>
                </label>
                <a class="button secondary" href="https://soundcloud.com/the-gustavo-swingtet" target="_blank" rel="noreferrer">SoundCloud</a>
              </div>

              <audio preload="metadata" class="custom-audio-element" data-audio-element>
                <source src="assets/audio/memories%20take%202.m4a" type="audio/mp4">
                <span data-i18n="media.audioFallback"></span>
              </audio>
            </div>
          </div>
        </section>
