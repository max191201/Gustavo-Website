<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Gustavo Swingtet — acoustic swing from Bern, Switzerland.">
  <title>Contact — The Gustavo Swingtet</title>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/hod4umf.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="assets/images/favicon_mouse_trumpet.png">
</head>
<body data-page="contact">
  
<header class="site-header">
  <div class="container">
    <a class="wordmark" href="index.html" aria-label="The Gustavo Swingtet home">
      <span class="wordmark-top">The Gustavo</span>
      <span class="wordmark-bottom">Swingtet</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation" data-nav-toggle>
      <span class="sr-only" data-i18n="common.srOpenNavigation"></span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 7h16v2H4zm0 6h16v2H4zm0 6h16v2H4z"/></svg>
    </button>

    <div class="nav-row" id="site-navigation" data-nav-row>
      <nav class="site-nav" aria-label="Primary" data-i18n-aria-label="common.ariaPrimaryNav">
        <a href="index.html" class="" data-i18n="common.navHome"></a>
<a href="media.html" class="" data-i18n="common.navMedia"></a>
<a href="about.html" class="" data-i18n="common.navAbout"></a>
<a href="contact.html" class="active" data-i18n="common.navContact"></a>
      </nav>

      <div class="lang-switch" aria-label="Language switcher" data-i18n-aria-label="common.ariaLanguageSwitcher">
        <button type="button" data-lang-button="en" aria-pressed="true">EN</button>
        <button type="button" data-lang-button="de" aria-pressed="false">DE</button>
        <button type="button" data-lang-button="fr" aria-pressed="false">FR</button>
      </div>
    </div>
  </div>
</header>

  <main class="page-shell">
    
<section class="hero-page">
  <div class="container">
    <div class="hero-copy">
      <span class="eyebrow" data-i18n="contact.heroEyebrow"></span>
      <h1 class="page-title" data-i18n="contact.pageTitle"></h1>
      <p class="page-intro" data-i18n="contact.heroIntro"></p>
    </div>
  </div>
</section>

<section class="section">
  <div class="container contact-layout">
    <div class="info-card">
      <span class="eyebrow" data-i18n="contact.infoEyebrow"></span>
      <h2 class="section-title" data-i18n="contact.infoTitle"></h2>
      <p class="section-copy" data-i18n="contact.infoCopy"></p>

      <div class="contact-list">
        <div class="row">
          <strong data-i18n="contact.row1Label"></strong>
          <a href="mailto:contact@gustavoswingtet.ch">contact@gustavoswingtet.ch</a>
        </div>
        <div class="row">
          <strong data-i18n="contact.row2Label"></strong>
          <span data-i18n="contact.row2Value"></span>
          <span class="detail-note" data-i18n="contact.row2Note"></span>
        </div>
        <div class="row">
          <strong data-i18n="contact.row3Label"></strong>
          <span data-i18n="contact.row3Value"></span>
        </div>
        <div class="row">
          <strong data-i18n="contact.row4Label"></strong>
          <span data-i18n="contact.row4Value"></span>
        </div>
      </div>

      <div class="hero-actions" style="margin-top: 1.4rem;">
        <a class="social-link" href="https://www.youtube.com/@GustavoSwingtet" target="_blank" rel="noreferrer" aria-label="YouTube"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.7 15.7V8.3L16.2 12l-6.5 3.7Z"/></svg></a>
        <a class="social-link" href="https://www.instagram.com/gustavoswingtet/" target="_blank" rel="noreferrer" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm10.45 1.65a1.35 1.35 0 1 1 0 2.7 1.35 1.35 0 0 1 0-2.7ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.2A2.8 2.8 0 1 0 12 14.8 2.8 2.8 0 0 0 12 9.2Z"/></svg></a>
        <a class="social-link" href="https://soundcloud.com/the-gustavo-swingtet" target="_blank" rel="noreferrer" aria-label="SoundCloud"><img class="soundcloud-icon-img" src="https://cdn.simpleicons.org/soundcloud/E5D1B1?viewbox=auto" alt="" aria-hidden="true"></a>
      </div>
    </div>

    <div class="form-card">
      <span class="eyebrow" data-i18n="contact.formEyebrow"></span>
      <h2 class="section-title" data-i18n="contact.formTitle"></h2>
      <p class="section-copy" data-i18n="contact.formCopy"></p>

      <form action="https://formspree.io/f/mojknagy" method="POST" class="form-grid" style="margin-top: 1.35rem;">
        <input type="hidden" name="_subject" value="New booking enquiry from gustavoswingtet.ch">
        <label>
          <span data-i18n="contact.formName"></span>
          <input type="text" name="name" required data-i18n-placeholder="contact.formPlaceholderName">
        </label>
        <div class="form-grid two">
          <label>
            <span data-i18n="contact.formEmail"></span>
            <input type="email" name="email" required data-i18n-placeholder="contact.formPlaceholderEmail">
          </label>
          <label>
            <span data-i18n="contact.formEvent"></span>
            <input type="text" name="event" data-i18n-placeholder="contact.formPlaceholderEvent">
          </label>
        </div>
        <label>
          <span data-i18n="contact.formMessage"></span>
          <textarea name="message" required data-i18n-placeholder="contact.formPlaceholderMessage"></textarea>
        </label>
        <button class="button primary" type="submit" data-i18n="contact.formButton"></button>
        <p class="form-note" data-i18n="contact.formNote"></p>
      </form>
    </div>
  </div>
</section>

<section class="section tight">
  <div class="container grid-2">
    <div class="panel text-panel">
      <span class="eyebrow" data-i18n="contact.bookingEyebrow"></span>
      <h2 class="section-title" data-i18n="contact.bookingTitle"></h2>
      <ul class="booking-list">
        <li data-i18n="contact.booking1"></li>
        <li data-i18n="contact.booking2"></li>
        <li data-i18n="contact.booking3"></li>
      </ul>
    </div>
    <div class="panel image-panel">
      <img src="assets/images/hero.jpg" alt="Warm live setting with band performing.">
    </div>
  </div>
</section>

  </main>
  
<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <div class="footer-copy" data-i18n="common.footerTagline"></div>
      <div class="footer-copy" style="margin-top: 0.35rem;"><a href="mailto:contact@gustavoswingtet.ch" data-i18n="common.footerMail"></a></div>
      <div class="footer-copy" style="margin-top: 0.35rem;"><span data-year></span> · <span data-i18n="common.footerCopyright"></span></div>
    </div>

    <div>
      <div class="footer-copy" style="margin-bottom: 0.65rem;" data-i18n="common.socialHeading"></div>
      <div class="social-row">
        <a class="social-link" href="https://www.youtube.com/@GustavoSwingtet" target="_blank" rel="noreferrer" aria-label="YouTube"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.7 15.7V8.3L16.2 12l-6.5 3.7Z"/></svg></a>
        <a class="social-link" href="https://www.instagram.com/gustavoswingtet/" target="_blank" rel="noreferrer" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm10.45 1.65a1.35 1.35 0 1 1 0 2.7 1.35 1.35 0 0 1 0-2.7ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.2A2.8 2.8 0 1 0 12 14.8 2.8 2.8 0 0 0 12 9.2Z"/></svg></a>
        <a class="social-link" href="https://soundcloud.com/the-gustavo-swingtet" target="_blank" rel="noreferrer" aria-label="SoundCloud"><img class="soundcloud-icon-img" src="https://cdn.simpleicons.org/soundcloud/E5D1B1?viewbox=auto" alt="" aria-hidden="true"></a>
      </div>
    </div>
  </div>
</footer>
<div class="toast" aria-live="polite" data-toast></div>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
